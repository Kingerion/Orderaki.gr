    const { getDatabase, ref, set, push, update, onValue, get } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const app = initializeApp(CFG);

<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;--border:rgba(255,255,255,.08);--text:#f5f5f5;--text2:#a0a0a0;--text3:#666;--accent:#ff4500;--accent2:#ff6b35;--green:#22c55e;--green-dark:#16a34a;--red:#ef4444;--yellow:#f59e0b;--shadow:0 4px 20px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;max-width:430px;margin:0 auto;position:relative;overflow-x:hidden}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── AUTH ── */
.auth-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse at 50% 0%,rgba(255,69,0,.15),transparent 60%)}
.auth-logo{text-align:center;margin-bottom:36px}
.auth-logo-icon{width:64px;height:64px;background:var(--accent);border-radius:20px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 8px 24px rgba(255,69,0,.4)}
.auth-logo-text{font-size:28px;font-weight:900;letter-spacing:-1px}
.auth-logo-text span{color:var(--accent)}
.auth-logo-sub{font-size:14px;color:var(--text2);margin-top:4px}
.auth-tabs{display:flex;background:var(--surface2);border-radius:14px;padding:4px;gap:3px;margin-bottom:24px}
.auth-tab{flex:1;text-align:center;padding:10px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text3);transition:all .15s}
.auth-tab.active{background:var(--surface3);color:var(--text)}
.f-group{margin-bottom:13px}
.f-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);display:block;margin-bottom:6px}
.f-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;font-family:'Outfit',sans-serif}
.f-input:focus{border-color:var(--accent)}
.f-input::placeholder{color:var(--text3)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.auth-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(255,69,0,.4);transition:all .2s;font-family:'Outfit',sans-serif;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-btn:hover{background:#e03d00}
.auth-btn .material-icons-round{font-size:20px}
.auth-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;display:none;margin-bottom:12px}
.auth-error.show{display:block}

/* ── PENDING SCREEN ── */
.pending-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:16px}
.pending-icon{width:80px;height:80px;border-radius:50%;background:rgba(245,158,11,.15);display:flex;align-items:center;justify-content:center}
.pending-icon .material-icons-round{font-size:40px;color:var(--yellow)}
.pending-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.pending-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:280px}
.pending-badge{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--yellow);padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700}

/* ── TOPBAR ── */
.topbar{background:var(--surface);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.top-driver-info{display:flex;align-items:center;gap:12px}
.top-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.top-name{font-size:14px;font-weight:700}
.top-role{font-size:11px;color:var(--text3)}
.online-toggle{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:7px 14px;cursor:pointer;transition:all .2s}
.online-toggle.on{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3)}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background .2s}
.online-toggle.on .online-dot{background:var(--green);box-shadow:0 0 8px var(--green)}
.online-label{font-size:12px;font-weight:800;color:var(--text3)}
.online-toggle.on .online-label{color:var(--green)}

/* ── EARNINGS BAR ── */
.earnings-bar{background:var(--accent);padding:12px 20px;display:flex;justify-content:space-around}
.earn-item{text-align:center}
.earn-val{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px}
.earn-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.7);margin-top:2px}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px}

/* ── ORDER CARD ── */
.order-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.order-card.new-order{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,69,0,.15),var(--shadow)}
.order-card.new-order::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.new-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.order-card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.order-id{font-size:13px;font-weight:800;color:var(--accent)}
.order-store{font-size:14px;font-weight:700;margin-top:2px}
.order-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.order-info-item{background:var(--surface2);border-radius:10px;padding:10px 12px}
.order-info-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:3px}
.order-info-val{font-size:13px;font-weight:700}
.order-addr{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.order-addr .material-icons-round{font-size:18px;color:var(--accent);flex-shrink:0;margin-top:1px}
.order-addr-text{font-size:13px;font-weight:600;line-height:1.4}
.order-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.order-total-label{font-size:13px;color:var(--text2)}
.order-total-val{font-size:20px;font-weight:900;letter-spacing:-1px;color:var(--text)}
.order-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-accept{background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.btn-accept:hover{background:var(--green-dark)}
.btn-accept .material-icons-round{font-size:18px}
.btn-delivered{background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;grid-column:span 2;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-delivered .material-icons-round{font-size:18px}
.status-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
.st-assigned{background:rgba(245,158,11,.15);color:var(--yellow)}
.st-picked{background:rgba(139,92,246,.15);color:#a78bfa}
.st-delivered{background:rgba(34,197,94,.12);color:var(--green)}
.empty-orders{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text3)}
.empty-orders .material-icons-round{font-size:48px;opacity:.25}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 120px)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;word-break:break-word}
.msg.me{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.them{background:var(--surface2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.5;margin-top:4px;display:block;text-align:right}
.msg.them .msg-time{text-align:left}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);flex-shrink:0}
.chat-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;font-family:'Outfit',sans-serif}
.chat-input:focus{border-color:var(--accent)}
.chat-send{width:42px;height:42px;background:var(--accent);border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0}
.chat-send .material-icons-round{font-size:20px}

/* ── EARNINGS PAGE ── */
.earn-page{padding:20px}
.earn-big-card{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;padding:28px;text-align:center;margin-bottom:20px}
.earn-big-val{font-size:48px;font-weight:900;color:#fff;letter-spacing:-3px}
.earn-big-label{font-size:13px;color:rgba(255,255,255,.8);margin-top:4px;font-weight:600}
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.earn-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.earn-card-val{font-size:26px;font-weight:900;letter-spacing:-1px}
.earn-card-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* ── PROFILE PAGE ── */
.profile-page{padding:20px}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center;margin-bottom:16px}
.profile-avatar{width:70px;height:70px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin:0 auto 12px;box-shadow:0 6px 20px rgba(255,69,0,.35)}
.profile-name{font-size:18px;font-weight:800;margin-bottom:2px}
.profile-email{font-size:13px;color:var(--text3)}
.profile-status{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.12);color:var(--green);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
.profile-menu-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.profile-menu-item:hover{background:var(--surface2)}
.profile-menu-item .material-icons-round{font-size:20px;color:var(--text2)}
.profile-menu-item.danger .material-icons-round{color:var(--red)}
.profile-menu-item.danger span:last-child{color:var(--red)}
.profile-menu-label{flex:1;font-size:14px;font-weight:600}
.profile-menu-item .material-icons-round:last-child{font-size:16px;color:var(--text3)}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;color:var(--text3);transition:color .15s;position:relative}
.nav-item.active{color:var(--accent)}
.nav-item .material-icons-round{font-size:22px}
.nav-label{font-size:10px;font-weight:700}
.nav-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--accent);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:10px;min-width:16px;text-align:center}

/* ── REJECT SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;padding:20px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1)}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-title{font-size:16px;font-weight:800;margin-bottom:16px;text-align:center}
.reject-opt{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:8px;text-align:center}
.reject-opt:hover{border-color:var(--red);color:var(--red)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface3);color:var(--text);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:var(--shadow);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
::-webkit-scrollbar{width:0}
