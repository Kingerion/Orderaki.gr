<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>2Fast Driver</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<script type="module">
  const firebaseConfig = {
  apiKey: "AIzaSyA_MyIsYGScuuK-7qXAg4vPSPk5RS0uxNA",
  authDomain: "orderaki-cc05a.firebaseapp.com",
  databaseURL: "https://orderaki-cc05a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "orderaki-cc05a",
  storageBucket: "orderaki-cc05a.firebasestorage.app",
  messagingSenderId: "418215879535",
  appId: "1:418215879535:web:bf048c4b728862a5d5be9a"
};
  if (CFG.apiKey !== "AIzaSyA_MyIsYGScuuK-7qXAg4vPSPk5RS0uxNA") {
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getDatabase, ref, onValue, update, push, set } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
      const db = getDatabase(initializeApp(CFG));
      window._db=db; window._ref=ref; window._update=update; window._push=push; window._set=set; window._onValue=onValue; window._firebaseReady=true;
      onValue(ref(db,'orders'), s=>{ window._allFirebaseOrders=s.val()||{}; const n=window._driverName||localStorage.getItem('driverName'); if(n) filterDriverOrders(window._allFirebaseOrders,n); });
      onValue(ref(db,'drivers'), s=>{ window._allFirebaseDrivers=s.val()||{}; });
      onValue(ref(db,'chat'), s=>{ const d=s.val()||{}; window._allFirebaseChat=d; const n=window._driverName; if(n){ updateChatFromFirebase(d[n]||[]); } });
    } catch(e){ window._firebaseReady=false; }
  } else { window._firebaseReady=false; }
</script>

<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222;
  --border:rgba(255,255,255,.08); --accent:#ff3d00;
  --green:#22c55e; --yellow:#f59e0b; --blue:#3b82f6;
  --red:#ef4444; --text:#f1f5f9; --muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;overflow-x:hidden}

/* LOGIN */
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;background:radial-gradient(ellipse at 50% 0%,rgba(255,61,0,.12) 0%,transparent 60%),var(--bg)}
.login-logo{width:80px;height:80px;background:var(--accent);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;box-shadow:0 8px 32px rgba(255,61,0,.4)}
.login-title{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:36px}
.l-group{width:100%;margin-bottom:12px}
.l-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.l-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;outline:none;transition:border-color .15s}
.l-input:focus{border-color:var(--accent)}
.l-input::placeholder{color:var(--muted)}
.login-btn{width:100%;background:var(--accent);border:none;border-radius:14px;padding:16px;color:#fff;font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;cursor:pointer;margin-top:8px;box-shadow:0 6px 20px rgba(255,61,0,.35);transition:all .15s;letter-spacing:-.3px}
.login-btn:active{transform:scale(.98)}

/* APP */
.app-screen{display:none;flex-direction:column;min-height:100vh}
.app-screen.visible{display:flex}

/* HEADER */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header-av{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.header-name{font-size:16px;font-weight:700}
.header-role{font-size:11px;color:var(--muted)}
.online-toggle{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:20px;padding:6px 14px;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);font-size:12px;font-weight:700;user-select:none}
.online-toggle.online{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:var(--green)}
.online-toggle.offline{color:var(--muted)}
.toggle-dot{width:8px;height:8px;border-radius:50%}
.online-toggle.online .toggle-dot{background:var(--green);box-shadow:0 0 8px var(--green)}
.online-toggle.offline .toggle-dot{background:var(--muted)}

/* EARNINGS BAR */
.earnings-bar{background:linear-gradient(135deg,#1a0a00,#2a1200);border-bottom:1px solid rgba(255,61,0,.2);padding:12px 18px;display:flex}
.earn-item{flex:1;text-align:center}
.earn-item+.earn-item{border-left:1px solid rgba(255,255,255,.06)}
.earn-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px}
.earn-value{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;margin-top:2px}
.earn-value.money{color:var(--accent)}

/* BOTTOM NAV */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:10;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;transition:all .15s;color:var(--muted);gap:2px;position:relative}
.bnav-item .material-icons-round{font-size:22px}
.bnav-item span.label{font-size:10px;font-weight:600}
.bnav-item.active{color:var(--accent)}
.bnav-unread{position:absolute;top:6px;right:calc(50% - 16px);min-width:16px;height:16px;background:var(--red);border-radius:20px;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* CONTENT */
.content-area{flex:1;padding:14px;padding-bottom:80px;display:flex;flex-direction:column;gap:12px}

/* ORDER CARD */
.order-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;animation:cardIn .35s ease both;transition:border-color .2s}
.order-card.new-order{border-color:rgba(255,61,0,.5)}
.order-card.picked-order{border-color:rgba(245,158,11,.5)}
.order-card.delivered-order{border-color:rgba(34,197,94,.3);opacity:.6}
.order-card.rejected-card{border-color:rgba(239,68,68,.3);opacity:.7}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.card-id{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);background:rgba(255,61,0,.1);padding:3px 10px;border-radius:8px}
.card-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.st-new{background:rgba(59,130,246,.15);color:var(--blue)}
.st-assigned{background:rgba(255,61,0,.15);color:var(--accent)}
.st-picked{background:rgba(245,158,11,.15);color:var(--yellow)}
.st-delivered{background:rgba(34,197,94,.15);color:var(--green)}
.st-rejected{background:rgba(239,68,68,.15);color:var(--red)}
.card-time{margin-left:auto;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.card-customer{font-size:17px;font-weight:700}
.card-phone{font-size:13px;color:var(--muted)}
.route-item{display:flex;align-items:flex-start;gap:10px}
.route-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.route-icon .material-icons-round{font-size:15px}
.route-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.route-addr{font-size:13px;font-weight:500;color:var(--text)}
.card-notes{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--yellow);display:flex;align-items:center;gap:8px}
.card-notes .material-icons-round{font-size:15px;flex-shrink:0}
.card-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.cta-btn{flex:1;min-width:80px;border:none;border-radius:12px;padding:13px 8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.cta-btn:active{transform:scale(.97)}
.cta-pickup{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(255,61,0,.3)}
.cta-deliver{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.cta-maps{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
.cta-reject{background:rgba(239,68,68,.1);color:var(--red);border:1.5px solid rgba(239,68,68,.25)}
.cta-btn .material-icons-round{font-size:16px}
.cost-badge{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);white-space:nowrap}

/* EMPTY */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;text-align:center;color:var(--muted)}
.empty-state .material-icons-round{font-size:52px;opacity:.25}
.empty-title{font-size:17px;font-weight:700;color:var(--text);opacity:.5}
.empty-sub{font-size:13px}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* EARNINGS PAGE */
.earnings-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px}
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.earn-box{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px}
.earn-box-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.earn-box-val{font-size:24px;font-weight:800;font-family:'DM Mono',monospace}

/* ═══════════════════════════
   CHAT (Driver Side)
═══════════════════════════ */
.chat-screen{display:none;flex-direction:column;height:100%;padding-bottom:70px}
.chat-screen.active-page{display:flex}
.chat-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0}
.chat-hd-name{font-size:15px;font-weight:700}
.chat-hd-sub{font-size:11px;color:var(--muted)}
.chat-messages-area{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;word-break:break-word}
.msg.driver-out{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.admin-in{background:var(--surface2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-time{font-size:10px;opacity:.6;margin-top:3px;display:block;text-align:right}
.msg.admin-in .msg-time{text-align:left}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);flex-shrink:0}
.chat-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--muted)}
.chat-send-btn{width:44px;height:44px;background:var(--accent);border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0}
.chat-send-btn .material-icons-round{font-size:20px}

/* REJECT MODAL */
.reject-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.reject-overlay.open{opacity:1;pointer-events:all}
.reject-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.reject-overlay.open .reject-sheet{transform:translateY(0)}
.reject-title{font-size:18px;font-weight:800;margin-bottom:6px;color:var(--red)}
.reject-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.reject-reason-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:all .15s;margin-bottom:8px;font-size:14px;font-weight:600}
.reject-reason-btn:hover,.reject-reason-btn:active{border-color:var(--red);background:rgba(239,68,68,.08);color:var(--red)}
.reject-reason-btn .material-icons-round{font-size:20px;color:var(--muted)}
.reject-custom-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;margin-bottom:12px;transition:border-color .15s}
.reject-custom-input:focus{border-color:var(--red)}
.reject-custom-input::placeholder{color:var(--muted)}
.reject-btns{display:flex;gap:10px}
.reject-confirm{flex:1;background:var(--red);border:none;border-radius:12px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer}
.reject-cancel{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:var(--text);cursor:pointer}

/* PROFILE */
.profile-header{background:linear-gradient(135deg,rgba(255,61,0,.1),transparent);padding:30px 20px;text-align:center;border-bottom:1px solid var(--border)}
.profile-av{width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 12px;box-shadow:0 6px 20px rgba(255,61,0,.3)}
.profile-name{font-size:22px;font-weight:800;letter-spacing:-.5px}
.profile-role{font-size:13px;color:var(--muted)}
.menu-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;font-size:15px;font-weight:600}
.menu-item:hover{background:var(--surface2)}
.menu-item .material-icons-round{font-size:20px;color:var(--muted)}
.menu-item .arrow{margin-left:auto;font-size:18px;color:var(--border)}
.menu-item.danger{color:var(--red)}
.menu-item.danger .material-icons-round{color:var(--red)}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast .material-icons-round{font-size:18px;color:var(--green)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:10px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">⚡</div>
  <div class="login-title">2Fast Driver</div>
  <div class="login-sub">Εφαρμογή Οδηγών</div>
  <div class="l-group"><label class="l-label">Όνομά σου</label><input class="l-input" id="loginName" type="text" placeholder="π.χ. Νίκος Παπαδόπουλος"></div>
  <div class="l-group"><label class="l-label">PIN</label><input class="l-input" id="loginPin" type="password" placeholder="••••" inputmode="numeric"></div>
  <button class="login-btn" onclick="doLogin()">🚀 Σύνδεση</button>
</div>

<!-- APP -->
<div class="app-screen" id="appScreen">

  <!-- HEADER -->
  <div class="app-header">
    <div class="header-av" id="headerAv">Ν</div>
    <div><div class="header-name" id="headerName">Νίκος</div><div class="header-role">Οδηγός Delivery</div></div>
    <div class="online-toggle online" id="onlineToggle" onclick="toggleOnline()">
      <div class="toggle-dot"></div><span id="onlineLabel">Online</span>
    </div>
  </div>

  <!-- EARNINGS BAR -->
  <div class="earnings-bar">
    <div class="earn-item"><div class="earn-label">Σήμερα</div><div class="earn-value money" id="todayEarnings">€0.00</div></div>
    <div class="earn-item"><div class="earn-label">Παραδόσεις</div><div class="earn-value" id="todayDeliveries">0</div></div>
    <div class="earn-item"><div class="earn-label">Εβδομάδα</div><div class="earn-value money" id="weekEarnings">€0.00</div></div>
  </div>

  <!-- PAGES CONTAINER -->
  <div style="flex:1;overflow-y:auto;padding-bottom:70px">

    <!-- ORDERS PAGE -->
    <div class="page active" id="pageOrders">
      <div class="content-area" id="ordersArea"></div>
    </div>

    <!-- CHAT PAGE -->
    <div class="page" id="pageChat">
      <div class="chat-screen" id="chatScreen">
        <div class="chat-hd">
          <span class="material-icons-round" style="color:var(--accent)">support_agent</span>
          <div><div class="chat-hd-name">Admin</div><div class="chat-hd-sub">2Fast Delivery Support</div></div>
          <div style="margin-left:auto;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)"></div>
        </div>
        <div class="chat-messages-area" id="chatMsgsArea">
          <div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Γράψε στον admin για οποιοδήποτε πρόβλημα.</div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" placeholder="Γράψε μήνυμα..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendMsg();}">
          <button class="chat-send-btn" onclick="sendMsg()"><span class="material-icons-round">send</span></button>
        </div>
      </div>
    </div>

    <!-- EARNINGS PAGE -->
    <div class="page" id="pageEarnings">
      <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
        <div class="earnings-card">
          <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Κέρδη Σήμερα</div>
          <div style="font-size:40px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-2px"><span style="font-size:24px;color:var(--muted)">€</span><span id="bigEarnings">0.00</span></div>
        </div>
        <div class="earn-grid">
          <div class="earn-box"><div class="earn-box-label">Παραδόσεις</div><div class="earn-box-val" id="eTodayDel">0</div></div>
          <div class="earn-box"><div class="earn-box-label">Μέση Αξία</div><div class="earn-box-val" id="eAvg">€0</div></div>
          <div class="earn-box" style="grid-column:span 2"><div class="earn-box-label">Εβδομαδιαία Εκτίμηση</div><div class="earn-box-val" id="eWeek">€0.00</div></div>
        </div>
        <div class="earnings-card">
          <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Ιστορικό</div>
          <div id="earningsHistory"></div>
        </div>
      </div>
    <
