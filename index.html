const BG_MAP={burger:'linear-gradient(135deg,#ffecd2,#fcb69f)',pizza:'linear-gradient(135deg,#ff9a9e,#fecfef)',souvlaki:'linear-gradient(135deg,#a1c4fd,#c2e9fb)',sushi:'linear-gradient(135deg,#d299c2,#fef9d7)',coffee:'linear-gradient(135deg,#c8a97e,#f5deb3)',desserts:'linear-gradient(135deg,#fbc2eb,#a6c1ee)',greek:'linear-gradient(135deg,#d4fc79,#96e6a1)'};
const CAT_E={burger:'🍔',pizza:'🍕',souvlaki:'🌯',sushi:'🍣',coffee:'☕',desserts:'🍰',greek:'🥗'};
const DEMO_STORES={'s1':{name:'Burger House',emoji:'🍔',category:'burger',rating:4.8,deliveryTime:'20-25',deliveryCost:1.5,minOrder:10,open:true,description:'Smash burgers',menu:{m1:{name:'Classic Burger',emoji:'🍔',price:8.9,description:'200g μοσχάρι',available:true},m2:{name:'Double Cheese',emoji:'🧀',price:11.5,description:'Διπλό',available:true},m3:{name:'Πατάτες',emoji:'🍟',price:3.5,description:'Τραγανές',available:true}}},'s2':{name:'Pizza Napoli',emoji:'🍕',category:'pizza',rating:4.7,deliveryTime:'25-35',deliveryCost:2.0,minOrder:15,open:true,description:'Ναπολιτάνικη',menu:{m1:{name:'Margherita',emoji:'🍕',price:9.0,description:'Κλασική',available:true},m2:{name:'Diavola',emoji:'🌶️',price:11.0,description:'Πικάντικη',available:true}}},'s3':{name:'Souvlaki Station',emoji:'🌯',category:'souvlaki',rating:4.9,deliveryTime:'15-20',deliveryCost:1.0,minOrder:8,open:true,description:'Καλαμάκια',menu:{m1:{name:'Πίτα Γύρος',emoji:'🌯',price:3.5,description:'Χοιρινό',available:true},m2:{name:'Καλαμάκι',emoji:'🍢',price:2.5,description:'Κάρβουνα',available:true}}}};

let allStores={},filteredCat='all',cart={},activeStore=null,selectedPay='cash';
let customerProfile={},activeOrderKey=null,chatMsgs=[],chatListener=null;

function openAuthModal(){document.getElementById('authOverlay').classList.add('open');}
function closeAuthModal(){document.getElementById('authOverlay').classList.remove('open');}
document.getElementById('authOverlay').addEventListener('click',function(e){if(e.target===this)closeAuthModal();});
function switchAuthTab(t){document.getElementById('authTabLogin').classList.toggle('active',t==='login');document.getElementById('authTabReg').classList.toggle('active',t==='register');document.getElementById('authLoginForm').style.display=t==='login'?'block':'none';document.getElementById('authRegForm').style.display=t==='register'?'block':'none';}
function showAuthErr(msg){const e=document.getElementById('authErr');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),4000);}

function doCustomerLogin(){
  const email=document.getElementById('aLoginEmail').value.trim(),pass=document.getElementById('aLoginPass').value;
  if(!email||!pass){showAuthErr('Συμπλήρωσε email και κωδικό');return;}
  if(window._auth)window._signIn(window._auth,email,pass).then(()=>closeAuthModal()).catch(()=>showAuthErr('Λανθασμένα στοιχεία'));
}
function doCustomerRegister(){
  const name=document.getElementById('aRegName').value.trim(),phone=document.getElementById('aRegPhone').value.trim(),email=document.getElementById('aRegEmail').value.trim(),address=document.getElementById('aRegAddress').value.trim(),pass=document.getElementById('aRegPass').value;
  if(!name||!email||!pass){showAuthErr('Συμπλήρωσε όνομα, email & κωδικό');return;}
  if(pass.length<6){showAuthErr('Κωδικός min 6 χαρακτήρες');return;}
  if(window._auth){window._createUser(window._auth,email,pass).then(uc=>{window._set(window._ref(window._db,'customers/'+uc.user.uid),{name,phone,email,address,createdAt:Date.now()});closeAuthModal();}).catch(e=>showAuthErr(e.message));}
}
function doCustomerLogout(){if(window._auth)window._signOut(window._auth);closeProfile();showToast('Αποσυνδέθηκες');}

function onUserLoggedIn(user){
  closeAuthModal();
  const init=(user.email||'?').charAt(0).toUpperCase();
  document.getElementById('navAuth').innerHTML='<button class="nav-user-btn" onclick="openProfile()"><div class="nav-user-avatar">'+init+'</div><span>'+(user.email?.split('@')[0]||'Λογαριασμός')+'</span></button>';
  if(window._db){
    window._onValue(window._ref(window._db,'customers/'+user.uid),snap=>{
      const d=snap.val()||{};customerProfile=d;
      document.getElementById('profDisplayName').textContent=d.name||user.email;
      document.getElementById('profDisplayEmail').textContent=user.email||'';
      document.getElementById('profAvatarLg').textContent=(d.name||user.email||'?').charAt(0).toUpperCase();
      if(d.name)document.getElementById('profName').value=d.name;
      if(d.phone)document.getElementById('profPhone').value=d.phone;
      if(d.address)document.getElementById('profAddress').value=d.address;
      if(d.floor)document.getElementById('profFloor').value=d.floor;
      if(d.doorbell)document.getElementById('profDoorbell').value=d.doorbell;
      // Update nav avatar with name initial
      const ni=(d.name||user.email||'?').charAt(0).toUpperCase();
      document.getElementById('navAuth').innerHTML='<button class="nav-user-btn" onclick="openProfile()"><div class="nav-user-avatar">'+ni+'</div><span>'+(d.name||user.email?.split('@')[0]||'Λογαριασμός')+'</span></button>';
    });
    window._onValue(window._ref(window._db,'orders'),snap=>{
      const all=snap.val()||{};const uid=window._uid;const myO={};
      for(const[k,v]of Object.entries(all)){if(v.customerUid===uid)myO[k]=v;}
      renderMyOrders(myO);checkActiveOrderChat(myO);
    });
  }
}
function onUserLoggedOut(){document.getElementById('navAuth').innerHTML='<button class="nav-cta" onclick="openAuthModal()"><span class="material-icons-round" style="font-size:16px">person</span>Σύνδεση</button>';document.getElementById('chatFloat').style.display='none';document.getElementById('chatPanel').classList.remove('open');}

function saveProfileData(){
  const data={name:document.getElementById('profName')?.value||'',phone:document.getElementById('profPhone')?.value||'',address:document.getElementById('profAddress')?.value||'',floor:document.getElementById('profFloor')?.value||'',doorbell:document.getElementById('profDoorbell')?.value||''};
  customerProfile={...customerProfile,...data};
  if(window._db&&window._uid)window._update(window._ref(window._db,'customers/'+window._uid),data);
  localStorage.setItem('orderakiProfile',JSON.stringify(data));
}
function openProfile(){document.getElementById('profilePanel').classList.add('open');document.getElementById('profileBackdrop').classList.add('open');}
function closeProfile(){document.getElementById('profilePanel').classList.remove('open');document.getElementById('profileBackdrop').classList.remove('open');}

function renderMyOrders(orders){
  const entries=Object.entries(orders).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  const el=document.getElementById('profOrders');
  if(!entries.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Δεν υπάρχουν παραγγελίες</div>';return;}
  const sm={new:'Νέα',preparing:'Ετοιμάζεται',ready:'Έτοιμη',assigned:'Σε δρόμο',picked:'Σε δρόμο',delivered:'Παραδόθηκε',cancelled:'Ακυρώθηκε'};
  const sc={new:'var(--accent)',preparing:'#d97706',ready:'var(--green)',assigned:'var(--accent2)',picked:'var(--accent2)',delivered:'var(--green)',cancelled:'var(--red)'};
  el.innerHTML=entries.slice(0,10).map(([k,o])=>{const c=sc[o.status]||'var(--text3)';return'<div class="profile-order"><div class="profile-order-hd"><span class="profile-order-id">'+(o.id||k)+'</span><span class="profile-order-status" style="background:'+c+'18;color:'+c+'">'+(sm[o.status]||o.status)+'</span></div><div class="profile-order-items">'+(o.storeName||'—')+'</div><div class="profile-order-total">€'+(o.total||0).toFixed(2)+'</div></div>';}).join('');
}

// CHAT customer <-> driver
function checkActiveOrderChat(orders){
  activeOrderKey=null;
  for(const[k,o]of Object.entries(orders)){if(['assigned','picked'].includes(o.status)){activeOrderKey=k;break;}}
  if(activeOrderKey){document.getElementById('chatFloat').style.display='block';const o=orders[activeOrderKey];document.getElementById('chatDriverName').textContent='Chat — '+(o.driverName||'Courier');listenChat(activeOrderKey);}
  else{document.getElementById('chatFloat').style.display='none';document.getElementById('chatPanel').classList.remove('open');if(chatListener)chatListener();chatListener=null;}
}
function listenChat(orderKey){
  if(chatListener)chatListener();if(!window._db)return;
  const unsub=window._onValue(window._ref(window._db,'chat/customer/'+orderKey),snap=>{
    chatMsgs=snap.val()?Object.values(snap.val()):[];renderChatMsgs();
    const unread=chatMsgs.filter(m=>m.from==='driver').length;
    const badge=document.getElementById('chatUnreadBadge');
    if(unread>0){badge.style.display='flex';badge.textContent=unread;}else{badge.style.display='none';}
  });
  chatListener=unsub;
}
function renderChatMsgs(){
  const el=document.getElementById('customerChatMsgs');
  if(!chatMsgs.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Ξεκίνα τη συνομιλία!</div>';return;}
  el.innerHTML=chatMsgs.map(m=>'<div class="chat-msg '+(m.from==='customer'?'me':'them')+'">'+m.text+'<span class="chat-msg-time">'+new Date(m.time).toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'})+'</span></div>').join('');
  setTimeout(()=>{el.scrollTop=el.scrollHeight;},50);
}
function toggleChatPanel(){document.getElementById('chatPanel').classList.toggle('open');}
function sendCustomerChat(){
  if(!activeOrderKey)return;const input=document.getElementById('customerChatInput'),text=input.value.trim();
  if(!text)return;input.value='';
  const msg={from:'customer',text:text,time:Date.now(),customerName:customerProfile?.name||''};
  if(window._db)window._set(window._push(window._ref(window._db,'chat/customer/'+activeOrderKey)),msg);
}

// STORES
function loadStoresFromFirebase(data){
  if(!data||!Object.keys(data).length){allStores=DEMO_STORES;}
  else{allStores={};for(const[k,s]of Object.entries(data)){allStores[k]={...s,_key:k,deliveryTime:s.deliveryTime||'20-30'};}}
  updateHeroCount();renderStores();
}
window.loadStoresFromFirebase=loadStoresFromFirebase;
loadStoresFromFirebase(null);

function updateHeroCount(){document.getElementById('heroStoreCount').textContent=Object.keys(allStores).length+'+';}
function renderStores(){
  const grid=document.getElementById('storesGrid');
  let stores=Object.entries(allStores).map(([k,s])=>({...s,_key:k}));
  if(filteredCat!=='all')stores=stores.filter(s=>s.category===filteredCat);
  document.getElementById('clearFilter').className='clear-filter'+(filteredCat!=='all'?' show':'');
  if(!stores.length){grid.innerHTML='<div class="stores-empty"><span class="material-icons-round" style="font-size:48px;opacity:.25;display:block;margin:0 auto 12px">store_off</span>Δεν βρέθηκαν</div>';return;}
  grid.innerHTML=stores.map(s=>{const bg=BG_MAP[s.category]||'linear-gradient(135deg,#f0ede8,#e8e2d9)';return'<div class="store-card" onclick="openOrderModal(\''+s._key+'\')"><div class="store-card-cover" style="background:'+bg+'"><span style="font-size:44px">'+(s.emoji||'🍴')+'</span><div class="store-open-badge '+(s.open?'open':'closed')+'"><div class="open-dot"></div>'+(s.open?'Ανοιχτό':'Κλειστό')+'</div></div><div class="store-body"><div class="store-name">'+s.name+'</div><div class="store-meta"><span class="store-rating"><span class="material-icons-round">star</span>'+(s.rating||'4.5')+'</span><span><span class="material-icons-round">schedule</span>'+(s.deliveryTime||'20-30')+'′</span><span><span class="material-icons-round">delivery_dining</span>€'+(s.deliveryCost||2).toFixed(2)+'</span></div></div></div>';}).join('');
}
function filterByCategory(cat,el){filteredCat=cat;document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active-cat'));if(el)el.classList.add('active-cat');renderStores();document.getElementById('stores-sec').scrollIntoView({behavior:'smooth',block:'start'});}

// ORDER MODAL
function openOrderModal(storeKey){
  const s=allStores[storeKey];if(!s)return;activeStore={...s,_key:storeKey};cart={};
  if(window._db&&window._firebaseReady){window._onValue(window._ref(window._db,'stores/'+storeKey+'/menu'),snap=>{activeStore.menu=snap.val()||{};renderModal();},{onlyOnce:true});}else{renderModal();}
  document.getElementById('orderModal').classList.add('open');
  setTimeout(()=>{const p=customerProfile.name?customerProfile:JSON.parse(localStorage.getItem('orderakiProfile')||'{}');if(p.name&&document.getElementById('oName'))document.getElementById('oName').value=p.name;if(p.phone&&document.getElementById('oPhone'))document.getElementById('oPhone').value=p.phone;if(document.getElementById('oEmail'))document.getElementById('oEmail').value=p.email||window._currentUser?.email||'';if(p.address&&document.getElementById('oAddress'))document.getElementById('oAddress').value=p.address;if(p.floor&&document.getElementById('oFloor'))document.getElementById('oFloor').value=p.floor;if(p.doorbell&&document.getElementById('oDoorbell'))document.getElementById('oDoorbell').value=p.doorbell;updateSummary();},50);
  document.body.style.overflow='hidden';
}
function closeOrderModal(){document.getElementById('orderModal').classList.remove('open');document.body.style.overflow='';}
document.getElementById('orderModal').addEventListener('click',function(e){if(e.target===this)closeOrderModal();});

function renderModal(){
  const s=activeStore;const bg=BG_MAP[s.category]||'linear-gradient(135deg,#f0ede8,#e8e2d9)';
  const menuItems=Object.entries(s.menu||{}).map(([k,item])=>{
    if(!item.available)return'<div class="menu-item unavailable"><div class="menu-item-left"><span class="menu-item-emoji">'+(item.emoji||'🍴')+'</span><div><div class="menu-item-name">'+item.name+'</div><div class="menu-item-desc">'+(item.description||'')+' — <em>Μη διαθέσιμο</em></div></div></div><span class="menu-item-price">€'+(item.price||0).toFixed(2)+'</span></div>';
    return'<div class="menu-item" id="mi_'+k+'" onclick="addItem(\''+k+'\')"><div class="menu-item-left"><span class="menu-item-emoji">'+(item.emoji||'🍴')+'</span><div><div class="menu-item-name">'+item.name+'</div><div class="menu-item-desc">'+(item.description||'')+'</div></div></div><div style="display:flex;align-items:center;gap:10px"><span class="menu-item-price">€'+(item.price||0).toFixed(2)+'</span><div class="qty-control" id="qc_'+k+'" style="display:none" onclick="event.stopPropagation()"><div class="qty-btn" onclick="changeQty(\''+k+'\',-1)">−</div><div class="qty-num" id="qn_'+k+'">0</div><div class="qty-btn" onclick="changeQty(\''+k+'\',1)">+</div></div></div></div>';
  }).join('');
  document.getElementById('orderModalBox').innerHTML='<div class="modal-hd"><div class="modal-store-icon" style="background:'+bg+'">'+(s.emoji||'🍴')+'</div><div><div class="modal-store-name">'+s.name+'</div><div class="modal-store-meta">⭐ '+(s.rating||'4.5')+' · '+(s.deliveryTime||'20-30')+'′ · Min €'+(s.minOrder||10)+'</div></div><button class="modal-close" onclick="closeOrderModal()"><span class="material-icons-round">close</span></button></div><div class="modal-body"><div><div class="order-section-title">Μενού</div><div class="menu-items">'+(menuItems||'<div style="text-align:center;padding:20px;color:var(--text3)">Δεν υπάρχουν προϊόντα</div>')+'</div></div><div><div class="order-section-title">Στοιχεία Παράδοσης</div><div style="display:flex;flex-direction:column;gap:10px"><div class="form-row"><div class="form-group"><label class="form-label">Όνομα *</label><input class="form-input" id="oName" placeholder="Όνομα"></div><div class="form-group"><label class="form-label">Τηλέφωνο *</label><input class="form-input" id="oPhone" placeholder="69..." type="tel"></div></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="oEmail" placeholder="email@example.com" type="email"></div><div class="form-group"><label class="form-label">Διεύθυνση *</label><input class="form-input" id="oAddress" placeholder="Πατησίων 42, Αθήνα"></div><div class="form-row"><div class="form-group"><label class="form-label">Όροφος</label><input class="form-input" id="oFloor" placeholder="3ος"></div><div class="form-group"><label class="form-label">Κουδούνι</label><input class="form-input" id="oDoorbell" placeholder="Παπαδόπουλος"></div></div><div class="form-group"><label class="form-label">Σχόλια</label><input class="form-input" id="oNotes" placeholder="χωρίς κρεμμύδι..."></div></div></div><div><div class="order-section-title">Πληρωμή</div><div class="pay-options"><div class="pay-opt selected" id="pay_cash" onclick="selectPay(\'cash\')"><span class="material-icons-round">payments</span>Μετρητά</div><div class="pay-opt" id="pay_card" onclick="selectPay(\'card\')"><span class="material-icons-round">credit_card</span>Κάρτα</div><div class="pay-opt" id="pay_online" onclick="selectPay(\'online\')"><span class="material-icons-round">phone_iphone</span>Online</div></div></div><div class="order-summary"><div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Σύνοψη</div><div id="summaryLines"></div><div class="summary-row"><span>Παράδοση</span><span>€'+(s.deliveryCost||2).toFixed(2)+'</span></div><div class="summary-row total"><span>Σύνολο</span><span class="summary-val" id="summaryTotal">€'+(s.deliveryCost||2).toFixed(2)+'</span></div></div><button class="btn-order-submit" onclick="submitOrder()"><span class="material-icons-round">rocket_launch</span>Παράγγειλε τώρα!</button></div>';
}

function addItem(k){const menu=activeStore.menu||{};const item=menu[k];if(!item)return;if(!cart[k])cart[k]={item,qty:0};cart[k].qty++;updateCartUI(k);updateSummary();}
function changeQty(k,d){if(!cart[k])return;cart[k].qty+=d;if(cart[k].qty<=0)delete cart[k];updateCartUI(k);updateSummary();}
function updateCartUI(k){const qty=cart[k]?.qty||0;const qc=document.getElementById('qc_'+k),qn=document.getElementById('qn_'+k),mi=document.getElementById('mi_'+k);if(!qc)return;if(qty>0){qc.style.display='flex';qn.textContent=qty;mi?.classList.add('selected');}else{qc.style.display='none';mi?.classList.remove('selected');}}
function updateSummary(){const items=Object.values(cart);const sub=items.reduce((s,x)=>s+x.item.price*x.qty,0);const total=sub+(activeStore.deliveryCost||2);document.getElementById('summaryLines').innerHTML=items.map(x=>'<div class="summary-row"><span>'+(x.item.emoji||'')+' '+x.item.name+' ×'+x.qty+'</span><span>€'+(x.item.price*x.qty).toFixed(2)+'</span></div>').join('');document.getElementById('summaryTotal').textContent='€'+total.toFixed(2);}
function selectPay(t){selectedPay=t;['cash','card','online'].forEach(x=>document.getElementById('pay_'+x).classList.toggle('selected',x===t));}

function submitOrder(){
  const name=document.getElementById('oName')?.value.trim(),phone=document.getElementById('oPhone')?.value.trim(),address=document.getElementById('oAddress')?.value.trim();
  if(!name||!phone||!address){showToast('⚠️ Συμπλήρωσε όνομα, τηλέφωνο & διεύθυνση');return;}
  if(!Object.keys(cart).length){showToast('🛒 Πρόσθεσε προϊόν');return;}
  const floor=document.getElementById('oFloor')?.value.trim()||'',doorbell=document.getElementById('oDoorbell')?.value.trim()||'',email=document.getElementById('oEmail')?.value.trim()||'';
  const profData={name,phone,email,address,floor,doorbell};
  localStorage.setItem('orderakiProfile',JSON.stringify(profData));
  if(window._db&&window._uid)window._update(window._ref(window._db,'customers/'+window._uid),profData);
  const items=Object.values(cart);const sub=items.reduce((s,x)=>s+x.item.price*x.qty,0);
  const order={id:'#ORD'+(1000+Math.floor(Math.random()*9000)),storeId:activeStore._key,storeName:activeStore.name,storeAddress:activeStore.address||'',customerName:name,phone,email,address,floor,doorbell,notes:document.getElementById('oNotes')?.value||'',customerUid:window._uid||'',items:items.map(x=>({name:x.item.name,emoji:x.item.emoji||'',price:x.item.price,qty:x.qty})),subtotal:sub,deliveryCost:activeStore.deliveryCost||2,total:sub+(activeStore.deliveryCost||2),payment:selectedPay,status:'new',createdAt:Date.now()};
  if(window._db){const r=window._push(window._ref(window._db,'orders'));window._set(r,order);}
  showSuccess(order);
}

function showSuccess(order){
  document.getElementById('orderModalBox').innerHTML='<div class="order-success" style="display:flex"><div class="success-icon"><span class="material-icons-round">check_circle</span></div><h3 class="success-title">Η παραγγελία καταχωρήθηκε!</h3><p class="success-sub">'+order.id+' — Θα ειδοποιηθείς σε κάθε βήμα.</p><div class="tracking-card"><div style="font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Tracking</div><div class="tracking-steps"><div class="t-step"><div class="t-dot done"><span class="material-icons-round">check</span></div><div><div class="t-step-label">Ελήφθη</div><div class="t-step-sub">Μόλις τώρα</div></div></div><div class="t-step"><div class="t-dot active"><span class="material-icons-round">restaurant</span></div><div><div class="t-step-label">Αναμονή καταστήματος</div><div class="t-step-sub">Ετοιμασία σύντομα</div></div></div><div class="t-step"><div class="t-dot pending"><span class="material-icons-round">delivery_dining</span></div><div><div class="t-step-label">Σε δρόμο</div><div class="t-step-sub">Chat με τον courier</div></div></div><div class="t-step"><div class="t-dot pending"><span class="material-icons-round">home</span></div><div><div class="t-step-label">Παράδοση</div><div class="t-step-sub">Στην πόρτα σου</div></div></div></div></div><button class="btn-secondary" style="width:100%" onclick="closeOrderModal()">Κλείσιμο</button></div>';
}

window.addEventListener('scroll',()=>{document.getElementById('mainNav').classList.toggle('scrolled',window.scrollY>20);},{passive:true});
let toastT;
function showToast(msg){document.getElementById('toastMsg').textContent=msg;const t=document.getElementById('toast');t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500);}
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
window.installApp=function(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}};
</script>
