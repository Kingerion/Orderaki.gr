<style>
:root{--white:#fff;--off:#faf9f7;--cream:#f4f0e8;--stone:#e8e2d9;--text:#1a1714;--text2:#5c5751;--text3:#9c9590;--accent:#ff4500;--accent2:#ff6b35;--accent-light:rgba(255,69,0,.08);--border:rgba(26,23,20,.08);--border2:rgba(26,23,20,.14);--green:#16a34a;--green-light:rgba(22,163,74,.1);--shadow:0 4px 20px rgba(26,23,20,.08);--shadow-lg:0 12px 40px rgba(26,23,20,.12);--shadow-xl:0 24px 64px rgba(26,23,20,.14)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--white);color:var(--text);font-size:15px;line-height:1.6;overflow-x:hidden}
.display{font-family:'Fraunces',serif;font-weight:900;line-height:1.0;letter-spacing:-2px}
.display-lg{font-size:clamp(52px,8vw,96px)}.display-md{font-size:clamp(36px,5vw,58px)}
.container{max-width:1180px;margin:0 auto;padding:0 24px}
section{padding:90px 0}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:box-shadow .3s}
nav.scrolled{box-shadow:var(--shadow)}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:28px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.nav-logo-mark{width:36px;height:36px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 12px rgba(255,69,0,.35);transition:transform .2s}
.nav-logo:hover .nav-logo-mark{transform:rotate(-8deg) scale(1.05)}
.nav-logo-text{font-family:'Fraunces',serif;font-size:21px;font-weight:900;color:var(--text);letter-spacing:-1px}
.nav-logo-text span{color:var(--accent)}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-link{padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:var(--text2);text-decoration:none;transition:all .15s}
.nav-link:hover{background:var(--off);color:var(--text)}
.nav-cta{background:var(--accent);color:#fff;padding:9px 18px;border-radius:11px;font-size:14px;font-weight:700;text-decoration:none;transition:all .2s;box-shadow:0 4px 12px rgba(255,69,0,.3)}
.nav-cta:hover{background:#e03d00;transform:translateY(-1px)}

.hero{min-height:100vh;background:var(--off);display:flex;align-items:center;padding-top:64px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;pointer-events:none}
.hero-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
.hero-blob-1{width:600px;height:600px;background:radial-gradient(circle,rgba(255,69,0,.12) 0%,transparent 70%);top:-100px;right:-100px}
.hero-blob-2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,53,.1) 0%,transparent 70%);bottom:0;left:20%}
.hero-inner{max-width:1180px;margin:0 auto;padding:80px 24px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid var(--border2);padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;color:var(--accent);margin-bottom:26px;box-shadow:0 2px 8px rgba(0,0,0,.06);animation:fadeUp .8s both}
.hero-tag-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.hero-title{margin-bottom:22px;animation:fadeUp .8s .1s both}
.hero-title em{font-style:italic;color:var(--accent)}
.hero-sub{font-size:17px;color:var(--text2);line-height:1.65;margin-bottom:38px;max-width:480px;animation:fadeUp .8s .2s both}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp .8s .3s both}
.btn-primary{display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:15px 26px;border-radius:13px;font-size:15px;font-weight:700;text-decoration:none;box-shadow:0 6px 22px rgba(255,69,0,.35);transition:all .2s;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.btn-primary:hover{background:#e03d00;transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,69,0,.4)}
.btn-secondary{display:flex;align-items:center;gap:8px;background:var(--white);color:var(--text);padding:15px 26px;border-radius:13px;font-size:15px;font-weight:700;text-decoration:none;border:1.5px solid var(--border2);transition:all .2s;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.btn-secondary:hover{background:var(--cream);transform:translateY(-2px)}
.hero-stats{display:flex;gap:32px;margin-top:48px;animation:fadeUp .8s .4s both}
.hero-stat-value{font-family:'Fraunces',serif;font-size:30px;font-weight:900;letter-spacing:-1.5px}
.hero-stat-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.hero-phone{background:var(--white);border-radius:30px;box-shadow:var(--shadow-xl),0 0 0 1px rgba(0,0,0,.06);overflow:hidden;max-width:320px;margin:0 auto;animation:fadeUp .8s .2s both}
.phone-topbar{background:var(--white);padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.phone-logo{font-family:'Fraunces',serif;font-size:17px;font-weight:900;color:var(--accent)}
.phone-search{margin:12px 18px;background:var(--off);border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text3)}
.phone-search .material-icons-round{font-size:15px}
.phone-cats{display:flex;gap:7px;padding:0 18px 12px;overflow:hidden}
.phone-cat{background:var(--off);border-radius:20px;padding:6px 13px;font-size:11px;font-weight:700;white-space:nowrap;color:var(--text2);border:1.5px solid var(--border)}
.phone-cat.active{background:var(--accent);color:#fff;border-color:transparent}
.phone-card{margin:0 18px 12px;border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
.phone-card-img{height:90px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.phone-card-badge{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif}
.phone-card-body{padding:10px 13px}
.phone-card-name{font-size:13px;font-weight:800}
.phone-card-meta{display:flex;gap:10px;margin-top:4px}
.phone-card-meta span{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
.phone-card-meta .material-icons-round{font-size:11px}
.phone-order-btn{margin:0 18px 18px;background:var(--accent);color:#fff;border-radius:12px;padding:12px;text-align:center;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 12px rgba(255,69,0,.3)}
.hero-float{position:absolute;background:var(--white);border-radius:14px;padding:10px 14px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;white-space:nowrap;border:1px solid var(--border)}
.hero-float-1{top:20px;left:-40px;animation:float1 4s ease-in-out infinite}
.hero-float-2{bottom:50px;right:-30px;animation:float2 4s ease-in-out infinite .5s}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.section-label{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--accent);background:var(--accent-light);padding:6px 14px;border-radius:20px;margin-bottom:14px}
.section-title{margin-bottom:10px}
.section-sub{font-size:16px;color:var(--text2);max-width:520px;line-height:1.65}

.how{background:var(--white)}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:56px}
.step-card{background:var(--off);border-radius:22px;padding:34px 30px;border:1.5px solid var(--border);transition:all .3s;cursor:default;position:relative;overflow:hidden}
.step-card::before{content:'';position:absolute;top:0;right:0;width:120px;height:120px;background:radial-gradient(circle at top right,var(--accent-light),transparent 70%);opacity:0;transition:opacity .3s}
.step-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:rgba(255,69,0,.2)}
.step-card:hover::before{opacity:1}
.step-num{font-family:'Fraunces',serif;font-size:52px;font-weight:900;color:rgba(255,69,0,.1);line-height:1;margin-bottom:18px;letter-spacing:-3px}
.step-icon{width:48px;height:48px;background:var(--accent-light);border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.step-icon .material-icons-round{font-size:24px;color:var(--accent)}
.step-title{font-size:18px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
.step-text{font-size:14px;color:var(--text2);line-height:1.65}

.categories-sec{background:var(--off)}
.cat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-top:44px}
.cat-item{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--text)}
.cat-item:hover,.cat-item.active-cat{border-color:rgba(255,69,0,.4);background:var(--accent-light);transform:translateY(-3px);box-shadow:var(--shadow)}
.cat-emoji{font-size:32px;display:block;margin-bottom:8px;transition:transform .2s}
.cat-item:hover .cat-emoji{transform:scale(1.15) rotate(-5deg)}
.cat-name{font-size:11px;font-weight:700;color:var(--text2)}

.stores-section{background:var(--white)}
.stores-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.stores-filter-label{font-size:14px;font-weight:700;color:var(--text2)}
.clear-filter{background:var(--accent-light);color:var(--accent);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;display:none}
.clear-filter.show{display:inline-flex;align-items:center;gap:4px}
.stores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.store-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all .25s}
.store-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:rgba(255,69,0,.2)}
.store-card-cover{height:130px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.store-open-badge{position:absolute;top:10px;left:10px;background:var(--white);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.store-open-badge.open{color:var(--green)}.store-open-badge.closed{color:var(--text3)}
.open-dot{width:6px;height:6px;border-radius:50%}
.store-open-badge.open .open-dot{background:var(--green)}.store-open-badge.closed .open-dot{background:var(--text3)}
.store-body{padding:16px 18px 18px}
.store-name{font-size:16px;font-weight:800;margin-bottom:6px}
.store-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.store-meta span{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px;font-weight:600}
.store-meta .material-icons-round{font-size:13px}
.store-rating{color:var(--text)!important}.store-rating .material-icons-round{color:#f59e0b!important}
.store-tag{background:var(--off);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--text2)!important}
.stores-empty{text-align:center;padding:60px;color:var(--text3);grid-column:span 3}
.stores-empty .material-icons-round{font-size:48px;opacity:.25;display:block;margin:0 auto 12px}
.stores-loading{grid-column:span 3;text-align:center;padding:60px;color:var(--text3)}

.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(26,23,20,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--white);border-radius:28px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);transform:translateY(30px) scale(.97);transition:transform .3s cubic-bezier(.34,1.56,.64,1);border:1px solid var(--border)}
.modal-overlay.open .modal-box{transform:translateY(0) scale(1)}
.modal-hd{padding:26px 30px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;position:sticky;top:0;background:var(--white);z-index:1}
.modal-store-icon{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.modal-store-name{font-size:20px;font-weight:800;letter-spacing:-.5px}
.modal-store-meta{font-size:13px;color:var(--text3);margin-top:3px}
.modal-close{margin-left:auto;width:36px;height:36px;border-radius:10px;background:var(--off);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0;transition:all .15s}
.modal-close:hover{background:var(--stone)}.modal-close .material-icons-round{font-size:18px}
.modal-body{padding:26px 30px;display:flex;flex-direction:column;gap:26px}
.order-section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:14px}
.menu-items{display:flex;flex-direction:column;gap:9px}
.menu-item{display:flex;align-items:center;justify-content:space-between;background:var(--off);border:1.5px solid var(--border);border-radius:13px;padding:13px 15px;cursor:pointer;transition:all .15s}
.menu-item:hover{border-color:rgba(255,69,0,.3);background:var(--accent-light)}
.menu-item.selected{border-color:var(--accent);background:var(--accent-light)}
.menu-item.unavailable{opacity:.45;cursor:not-allowed}
.menu-item-left{display:flex;align-items:center;gap:11px}
.menu-item-emoji{font-size:24px}
.menu-item-name{font-size:14px;font-weight:700}
.menu-item-desc{font-size:12px;color:var(--text3);margin-top:2px}
.menu-item-price{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-1px}
.qty-control{display:flex;align-items:center;gap:9px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:17px;font-weight:700;color:var(--text2)}
.qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.qty-num{font-size:14px;font-weight:800;min-width:18px;text-align:center}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.form-input{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:11px;padding:12px 15px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;font-family:'Plus Jakarta Sans',sans-serif}
.form-input:focus{border-color:var(--accent);background:var(--white)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.pay-options{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.pay-opt{border:1.5px solid var(--border);border-radius:11px;padding:13px 9px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:700;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:5px}
.pay-opt .material-icons-round{font-size:21px;color:var(--text3)}
.pay-opt:hover,.pay-opt.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.pay-opt.selected .material-icons-round{color:var(--accent)}
.order-summary{background:var(--off);border-radius:14px;padding:18px;border:1.5px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px}
.summary-row+.summary-row{border-top:1px solid var(--border)}
.summary-row.total{font-size:16px;font-weight:800}
.summary-row.total .summary-val{font-family:'Fraunces',serif;color:var(--accent);font-size:20px;letter-spacing:-1px}
.btn-order-submit{width:100%;background:var(--accent);color:#fff;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 6px 22px rgba(255,69,0,.35);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Plus Jakarta Sans',sans-serif}
