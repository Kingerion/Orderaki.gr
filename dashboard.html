<head>
<meta charset="UTF-8">

<title>2Fast Delivery — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<script type="module">
  const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA_MyIsYGScuuK-7qXAg4vPSPk5RS0uxNA",
  authDomain: "orderaki-cc05a.firebaseapp.com",
  databaseURL: "https://orderaki-cc05a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "orderaki-cc05a",
  storageBucket: "orderaki-cc05a.firebasestorage.app",
  messagingSenderId: "418215879535",
  appId: "1:418215879535:web:bf048c4b728862a5d5be9a"
};
  if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getDatabase, ref, onValue, update, push, set, serverTimestamp }
        = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
      const app = initializeApp(FIREBASE_CONFIG);
      const db = getDatabase(app);
      window._db = db; window._ref = ref; window._update = update;
      window._push = push; window._set = set; window._serverTimestamp = serverTimestamp;
      window._onValue = onValue; window._firebaseReady = true;
      onValue(ref(db,'orders'), s => { const d=s.val()||{}; window._firebaseOrders=d; renderOrdersFromFirebase(d); updateStats(d); if(autoDispatch) runAutoDispatch(d); });
      onValue(ref(db,'drivers'), s => { const d=s.val()||{}; window._firebaseDrivers=d; renderDriversFromFirebase(d); });
      onValue(ref(db,'stores'), s => { 
        const all=s.val()||{};
        window._firebaseStores=all;
        allStores=all;
        renderPendingStores(all);
      });
      onValue(ref(db,'chat/stores'), s => { window._storeChats=s.val()||{}; renderAllChats(); });
      onValue(ref(db,'chat/drivers'), s => { window._driverChats=s.val()||{}; renderAllChats(); });
    } catch(e) { window._firebaseReady = false; }
  } else { window._firebaseReady = false; }
</script>

<style>
:root {
  --bg:#f0ede8; --surface:#fff; --surface2:#f7f4f0;
  --border:rgba(0,0,0,0.08); --shadow:0 2px 16px rgba(0,0,0,0.07);
  --accent:#ff3d00; --accent2:#ff6d00; --dark:#1a1a1a;
  --muted:#8a8480; --green:#00b37e; --yellow:#f59e0b;
  --red:#ef4444; --blue:#3b82f6; --sidebar-w:230px; --text:#1a1a1a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--dark);display:flex;flex-direction:column;flex-shrink:0;position:relative;overflow:hidden}
.sidebar::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(255,61,0,.15) 0%,transparent 60%);pointer-events:none}
.logo{padding:22px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
.logo-mark{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(255,61,0,.4);flex-shrink:0}
.logo-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.1}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);font-weight:400;letter-spacing:1px;text-transform:uppercase}
.nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
.nav-label{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.45);transition:all .15s;font-size:13.5px;font-weight:500;position:relative}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(255,61,0,.2);color:#fff}
.nav-item.active .material-icons-round{color:var(--accent)}
.nav-item .material-icons-round{font-size:18px!important}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace}
.nav-badge.green{background:var(--green)}
.nav-badge.blue{background:var(--blue)}
.sidebar-user{padding:14px 12px;border-top:1px solid rgba(255,255,255,.07)}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
.user-row:hover{background:rgba(255,255,255,.05)}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
.user-name{font-size:13px;font-weight:600;color:#fff}
.user-role{font-size:10px;color:rgba(255,255,255,.3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);flex-shrink:0}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:-.5px}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(0,179,126,.1);border:1px solid rgba(0,179,126,.25);color:var(--green);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* AUTO-DISPATCH TOGGLE */
.auto-dispatch-wrap{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:6px 14px;cursor:pointer;transition:all .2s;user-select:none}
.auto-dispatch-wrap.on{background:rgba(0,179,126,.1);border-color:rgba(0,179,126,.4)}
.auto-dispatch-wrap.on .ad-label{color:var(--green)}
.ad-label{font-size:12px;font-weight:700;color:var(--muted);transition:color .2s}
.toggle-switch{width:32px;height:18px;background:var(--muted);border-radius:20px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--green)}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-switch.on::after{transform:translateX(14px)}

.tabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px}
.tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tab:hover:not(.active){color:var(--dark)}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:'Syne',sans-serif;letter-spacing:-.2px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(255,61,0,.3)}
.btn-primary:hover{background:#e63600;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--dark);border:1.5px solid var(--border)}
.btn-outline:hover{background:var(--surface2)}
.btn .material-icons-round{font-size:16px}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--muted);position:relative}
.icon-btn:hover{background:var(--border);color:var(--dark)}
.icon-btn .material-icons-round{font-size:18px}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--surface)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);transition:transform .15s;animation:slideUp .4s ease both;cursor:default}
.stat:hover{transform:translateY(-2px)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.stat:nth-child(1){animation-delay:.05s}.stat:nth-child(2){animation-delay:.10s}.stat:nth-child(3){animation-delay:.15s}.stat:nth-child(4){animation-delay:.20s}.stat:nth-child(5){animation-delay:.25s}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;letter-spacing:-1.5px;font-family:'DM Mono',monospace;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.grid-main{display:grid;grid-template-columns:1fr 290px;gap:16px;flex:1;min-height:0}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.panel-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.panel-title{font-size:14px;font-weight:800}
.count-badge{background:rgba(255,61,0,.1);color:var(--accent);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.search-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:7px 12px}
.search-wrap input{background:none;border:none;outline:none;font-family:'Syne',sans-serif;font-size:12.5px;color:var(--dark);width:150px}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap .material-icons-round{font-size:15px;color:var(--muted)}
.table-wrap{overflow-y:auto;flex:1}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);background:var(--surface2);position:sticky;top:0;z-index:1;white-space:nowrap}
td{padding:12px 16px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:#fdf9f7}
.order-id{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:500;background:rgba(255,61,0,.08);padding:3px 8px;border-radius:6px}
.cust-cell{display:flex;align-items:center;gap:9px}
.cust-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.cust-name{font-weight:700;font-size:13px}
.cust-phone{font-size:11px;color:var(--muted)}
.addr-text{font-size:12px;color:var(--muted);max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.s-new{background:rgba(59,130,246,.1);color:var(--blue)}
.s-assigned{background:rgba(245,158,11,.1);color:var(--yellow)}
.s-picked{background:rgba(255,109,0,.1);color:var(--accent2)}
.s-delivered{background:rgba(0,179,126,.1);color:var(--green)}
.s-failed{background:rgba(239,68,68,.1);color:var(--red)}
.s-rejected{background:rgba(239,68,68,.08);color:var(--red)}
.act-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--muted)}
.act-btn:hover{background:rgba(255,61,0,.08);color:var(--accent);border-color:rgba(255,61,0,.25)}
.act-btn .material-icons-round{font-size:15px}
.driver-sel{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--dark);cursor:pointer;outline:none;transition:border-color .15s;max-width:150px}
.driver-sel:focus{border-color:var(--accent)}

/* RIGHT COLUMN */
.right-col{display:flex;flex-direction:column;gap:16px;overflow:hidden}
.driver-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s}
.driver-row:hover{background:#fdf9f7}
.driver-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;position:relative}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--surface)}
.d-name{font-size:13px;font-weight:700}
.d-info{font-size:11px;color:var(--muted)}
.d-orders{margin-left:auto;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.d-orders span{color:var(--accent);font-weight:700}
.chat-btn-small{width:28px;height:28px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue);transition:all .15s;flex-shrink:0;position:relative}
.chat-btn-small:hover{background:rgba(59,130,246,.2)}
.chat-btn-small .material-icons-round{font-size:14px}
.chat-unread{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--red);border-radius:50%;font-size:8px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}

/* MAP */
.map-box{flex:1;min-height:160px;background:radial-gradient(circle at 40% 50%,rgba(255,61,0,.06) 0%,transparent 55%),linear-gradient(135deg,#f0ede8 0%,#e8e4df 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;position:relative;overflow:hidden}
.map-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);background-size:25px 25px}
.map-label{font-size:12px;font-weight:600;color:var(--muted);position:relative;z-index:1}

/* ═══════════════════════════════════════
   CHAT PANEL
═══════════════════════════════════════ */
.chat-overlay{position:fixed;inset:0;background:rgba(26,26,26,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:flex-end;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.chat-overlay.open{opacity:1;pointer-events:all}
.chat-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:360px;height:540px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(30px) scale(.97);transition:transform .25s;overflow:hidden}
.chat-overlay.open .chat-panel{transform:translateY(0) scale(1)}
.chat-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2);flex-shrink:0}
.chat-driver-list{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface2)}
.chat-driver-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);position:relative}
.chat-driver-item:hover{background:var(--surface)}
.chat-driver-item.active{background:var(--surface);border-left:3px solid var(--accent)}
.chat-driver-item .d-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.chat-driver-name{font-size:12px;font-weight:700}
.chat-driver-last{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.chat-unread-badge{position:absolute;top:8px;right:10px;min-width:16px;height:16px;background:var(--red);border-radius:20px;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
